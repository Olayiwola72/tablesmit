name: Deploy to Netlify

on:
  push:
    branches:
      - main
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  validate-branch-name:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        run: |
          BRANCH="${GITHUB_HEAD_REF}"
          if [[ ! "$BRANCH" =~ ^(feature|fix|docs|chore|test|refactor|content|i18n|feat)\/.+ ]]; then
            echo "Invalid branch name: '$BRANCH'"
            echo "Allowed prefixes: feature/ feat/ fix/ docs/ chore/ test/ refactor/ content/ i18n/"
            exit 1
          fi
          echo "Branch name '$BRANCH' is valid."


  build-and-deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (for prerender)
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Audit
        run: npm run audit

      - name: Build
        run: npm run build --if-present

      - name: Deploy to Netlify
        if: github.ref == 'refs/heads/main'
        run: |
          curl "$deploy_url"
        env:
          deploy_url: ${{ secrets.NETLIFY_DEPLOY_HOOK_URL }}

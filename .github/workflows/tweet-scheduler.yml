name: Tweet Scheduler

on:
  schedule:
    # Tuesday 10am EST = 15:00 UTC (winter) / 14:00 UTC (summer)
    - cron: '0 14 * * 2'
    - cron: '0 15 * * 2'
    # Wednesday 12pm EST = 17:00 UTC (winter) / 16:00 UTC (summer)
    - cron: '0 16 * * 3'
    - cron: '0 17 * * 3'
    # Thursday 10am EST = 15:00 UTC (winter) / 14:00 UTC (summer)
    - cron: '0 14 * * 4'
    - cron: '0 15 * * 4'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Post scheduled tweet
        run: npx tsx scripts/scheduler/scheduler.ts
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}

      - name: Commit tweet log
        run: |
          git config user.name "tablesmit-bot"
          git config user.email "bot@tablesmit.com"
          git add scripts/scheduler/tweet-log.json
          git diff --cached --quiet || git commit -m "tweet: log scheduled post"
          git push

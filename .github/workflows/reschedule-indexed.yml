name: Reschedule Indexed Posts on dev.to

on:
  schedule:
    # Every Monday at 8:00 UTC (9:00 WAT)
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  reschedule:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reschedule indexed posts
        run: npm run crosspost -- --reschedule-indexed
        env:
          VITE_DEVTO_API_KEY: ${{ secrets.VITE_DEVTO_API_KEY }}

      - name: Commit updated tracking file
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add scripts/.crossposted.json
          git diff --staged --quiet || git commit -m 'chore: update indexing hash after reschedule [skip ci]'
          git push
